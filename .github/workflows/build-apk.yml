 name: Compilar APK desde ZIP (arreglo ruta)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir y arreglar ruta
        run: |
          unzip -o ia-local.zip
          # Si hay una carpeta extra, movemos todo afuera
          if [ -d "ia-local" ]; then
            mv ia-local/* .
            rm -rf ia-local
          fi
          ls -la # Verás que ya salen gradlew y las carpetas

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Permisos
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ gradlew listo"
          else
            echo "❌ No se encontró gradlew, revisa el ZIP"
            exit 1
          fi

      - name: Compilar APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-IA-LOCAL
          path: app/build/outputs/apk/debug/*.apk
