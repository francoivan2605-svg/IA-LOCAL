
name: Compilar APK desde ZIP
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir proyecto
        run: |
          unzip -o ia-local.zip
          if [ -d "ia-local" ]; then
            mv ia-local/* .
            rm -rf ia-local
          fi
          ls -la

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar APK sin requerir gradlew
        run: |
          # Si no hay gradlew, generamos la estructura
          if [ ! -f "build.gradle" ]; then
            echo "ERROR: No es un proyecto Android válido"
            exit 1
          fi
          # Usamos gradle directamente si falta el wrapper
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew clean assembleDebug --stacktrace
          else
            gradle clean assembleDebug --stacktrace
          fi

      - name: Guardar APK listo
        uses: actions/upload-artifact@v4
        with:
          name: APK-Listo
          path: app/build/outputs/apk/debug/*.apk
