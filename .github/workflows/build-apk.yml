name: Compilar APK de AIDE
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Descomprimir y listar todo
        run: |
          unzip -o ia-local.zip
          ls -la # Veremos exactamente qué hay adentro

      - name: Instalar herramientas de compilación
        run: |
          sudo apt update && sudo apt install -y android-sdk build-essential openjdk-17-jdk
          export ANDROID_HOME=/usr/lib/android-sdk

      - name: Buscar estructura de AIDE y compilar
        run: |
          # Si no hay estructura Gradle, usamos el método de AIDE
          if [ ! -f "build.gradle" ]; then
            echo "⚠️ Proyecto de AIDE detectado, ajustando..."
            # Generamos la estructura mínima que falta
            cat > build.gradle << 'EOF'
            buildscript {
                repositories { google() mavenCentral() }
                dependencies { classpath 'com.android.tools.build:gradle:7.4.2' }
            }
            task clean(type: Delete) { delete rootProject.buildDir }
            EOF
          fi
          
          # Intentamos compilar con gradle o con herramientas de AIDE
          which gradle || echo "No se encontró gradle, ajustando..."
