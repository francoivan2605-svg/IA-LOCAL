name: Compilar APK desde ZIP (listo)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Traer archivos del repositorio
        uses: actions/checkout@v4

      - name: Descomprimir el proyecto
        run: |
          unzip -o ia-local.zip
          ls -la # Verás que salen todas las carpetas bien

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permisos al compilador
        run: |
          chmod +x gradlew
          chmod +x gradlew.bat || true

      - name: Compilar el APK
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Guardar APK listo
        uses: actions/upload-artifact@v4
        with:
          name: APK-IA-LOCAL
          path: app/build/outputs/apk/debug/*.apk
