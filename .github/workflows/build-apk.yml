name: Compilar APK DEFINITIVO
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar y descomprimir ZIP
        run: |
          ZIP=$(find . -name "*.zip" | head -n 1)
          if [ -z "$ZIP" ]; then
            echo "❌ NO SE ENCONTRÓ NINGÚN ARCHIVO ZIP EN EL REPOSITORIO"
            exit 1
          fi
          echo "✅ Encontrado: $ZIP"
          unzip -o "$ZIP"
          # Arreglar carpeta extra
          if [ -d "ia-local" ]; then
            mv ia-local/* .
            rm -rf ia-local
          fi
          ls -la

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Permisos y compilar
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-LISTO
          path: app/build/outputs/apk/debug/*.apk
